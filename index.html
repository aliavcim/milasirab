<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mila 💖</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    overflow:hidden;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
    background-size: 400% 400%;
    animation: bgAnim 10s ease infinite;
}

@keyframes bgAnim {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.screen {
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-align:center;
    backdrop-filter: blur(10px);
}

img {
    max-width:80%;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s;
}

h1,h2,p {
    animation: fadeInUp 1s;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes fadeInUp {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

button {
    padding:12px 25px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    margin:5px;
    transition:0.3s;
}

button:hover {
    transform:scale(1.1);
}

.yes{
    background:#4CAF50;
    color:white;
}

.no{
    background:red;
    color:white;
    font-size:10px;
    position:absolute;
}
</style>

</head>

<body>

<div id="app"></div>
<audio id="music" src="music.mp3"></audio>

<script>
let name="";
let current=0;
let slides=[];

function intro(){
document.getElementById("app").innerHTML=`
<div class="screen">
<h2>İsmini yaz 💖</h2>
<input id="nameInput" style="padding:10px;border-radius:10px;border:none;">
<br><br>
<button onclick="start()">Devam</button>
</div>
`;
}

function start(){
name=document.getElementById("nameInput").value||"Sevgilim";
wrapped();
}

function wrapped(){
slides=[
`<h1>Sevgili ${name} 💕</h1><p>Seninle anılarımıza bakalım...</p>`,
`<img src="image1.png"><p>Başlangıç 💖</p>`,
`<img src="image2.png"><p>En tatlı halin 🥺</p>`,
`<img src="image3.png"><p>Unutulmaz an 💫</p>`,
`<img src="image4.png"><p>Gülüşün 😍</p>`,
`<img src="image5.png"><p>Ve şimdi...</p>`,
`<h1>Hazır mısın? 😏</h1>`
];

renderSlide();
autoSlide();

let startX=0;
document.addEventListener("touchstart",e=>{
 startX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
 let endX=e.changedTouches[0].clientX;
 if(endX<startX-50) nextSlide();
 if(endX>startX+50) prevSlide();
});
}

function renderSlide(){
document.getElementById("app").innerHTML=`
<div class="screen">${slides[current]}</div>
`;
}

function nextSlide(){
current++;
if(current>=slides.length){
 first();
 return;
}
renderSlide();
}

function prevSlide(){
if(current>0){
 current--;
 renderSlide();
}
}

function autoSlide(){
setInterval(()=>{
 if(current<slides.length){
  nextSlide();
 }
},3000);
}

let noCount=0;
let timer;

function first(){
document.getElementById("app").innerHTML=`
<div class="screen">
<h2>${name}, benimle barışır mısın? 💕</h2>
<button id="yes" class="yes">Evet</button>
<button id="no" class="no">Hayır</button>
</div>
`;

let yes=document.getElementById("yes");
let no=document.getElementById("no");

yes.onclick=()=>final();

function move(){
 noCount++;
 no.style.top=Math.random()*80+"%";
 no.style.left=Math.random()*80+"%";

 if(noCount>=5){
  alert("Yanlış cevap 😈");
  second();
 }
}

no.addEventListener("mouseover",move);
no.addEventListener("touchstart",move);
}

function second(){
document.getElementById("app").innerHTML=`
<div class="screen">
<h2>${name}, benimle barışır mısın? 😏</h2>
<button onclick="final()">Evet</button>
<button onclick="final()">Evet</button>
</div>
`;

timer=setTimeout(()=>{
 alert("Cevap evet sayıldı 😎");
 final();
},10000);
}

function final(){
clearTimeout(timer);

document.getElementById("app").innerHTML=`
<div class="screen">
<h1>BARISTIIIIKKKKK!!!!! 💖🎉</h1>
<p>Şarkı seçimim harika dimi - Ali 😎</p>
<img src="image.png">
</div>
`;

document.getElementById("music").play().catch(()=>{});
}

intro();
</script>

</body>
</html>
