<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mila 💖</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    overflow:hidden;
    background:black;
}

.screen {
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    text-align:center;
}

.slide {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:0.6s;
}

img {
    max-width:80%;
    border-radius:20px;
    margin-bottom:20px;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:10px;
}

.yes{background:#4CAF50;color:white;}
.no{background:red;color:white;font-size:10px;position:absolute;}

.hidden {opacity:0; transform:translateX(100%);}
.active {opacity:1; transform:translateX(0);}
.prev {opacity:0; transform:translateX(-100%);}
</style>

</head>

<body>

<div id="app"></div>
<audio id="music" src="music.mp3"></audio>

<script>
let name="";
let current=0;
let slides=[];

// İSİM
function intro(){
document.getElementById("app").innerHTML=`
<div class="screen">
<h2>İsmini yaz 💖</h2>
<input id="nameInput">
<br><br>
<button onclick="start()">Devam</button>
</div>
`;
}

function start(){
name=document.getElementById("nameInput").value||"Sevgilim";
wrapped();
}

// WRAPPED
function wrapped(){
slides=[
`<h1>Sevgili ${name} 💕</h1><p>Seninle anılarımıza bakalım...</p>`,
`<img src="image1.png"><p>Başlangıç 💖</p>`,
`<img src="image2.png"><p>En tatlı halin 🥺</p>`,
`<img src="image3.png"><p>Unutulmaz an 💫</p>`,
`<img src="image4.png"><p>Gülüşün 😍</p>`,
`<img src="image5.png"><p>Ve şimdi...</p>`,
`<h1>Hazır mısın? 😏</h1>`
];

renderSlide();
autoSlide();

// swipe
let startX=0;
document.addEventListener("touchstart",e=>{
 startX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
 let endX=e.changedTouches[0].clientX;
 if(endX<startX-50) nextSlide();
 if(endX>startX+50) prevSlide();
});
}

function renderSlide(){
document.getElementById("app").innerHTML=`
<div class="screen fade">${slides[current]}</div>
`;
}

function nextSlide(){
current++;
if(current>=slides.length){
 first();
 return;
}
renderSlide();
}

function prevSlide(){
if(current>0){
 current--;
 renderSlide();
}
}

function autoSlide(){
setInterval(()=>{
 if(current<slides.length){
  nextSlide();
 }
},3000);
}

// SORU
let noCount=0;
let timer;

function first(){
document.getElementById("app").innerHTML=`
<div class="screen">
<h2>${name}, benimle barışır mısın? 💕</h2>
<button id="yes" class="yes">Evet</button>
<button id="no" class="no">Hayır</button>
</div>
`;

let yes=document.getElementById("yes");
let no=document.getElementById("no");

yes.onclick=()=>final();

function move(){
 noCount++;
 no.style.top=Math.random()*80+"%";
 no.style.left=Math.random()*80+"%";

 if(noCount>=5){
  alert("Yanlış cevap 😈");
  second();
 }
}

no.addEventListener("mouseover",move);
no.addEventListener("touchstart",move);
}

function second(){
document.getElementById("app").innerHTML=`
<div class="screen">
<h2>${name}, benimle barışır mısın? 😏</h2>
<button onclick="final()">Evet</button>
<button onclick="final()">Evet</button>
</div>
`;

timer=setTimeout(()=>{
 alert("Cevap evet sayıldı 😎");
 final();
},10000);
}

// FINAL
function final(){
clearTimeout(timer);

document.getElementById("app").innerHTML=`
<div class="screen">
<h1>BARISTIIIIKKKKK!!!!! 💖🎉</h1>
<p>Şarkı seçimim harika dimi - Ali 😎</p>
<img src="image.png">
</div>
`;

document.getElementById("music").play().catch(()=>{});
}

// başlat
intro();
</script>

</body>
</html>
